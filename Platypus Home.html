document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-cream-mid:   oklch(91%   0.018 78);\n      --tan:         oklch(72%   0.045 75);\n      --earth:       oklch(48%   0.04  68);\n      --moss:        oklch(46%   0.07 142);\n      --moss-light:  oklch(72%   0.06 142);\n      --ink:         oklch(16%   0.018 75);\n      --ink-soft:    oklch(35%   0.022 75);\n      --ink-faint:   oklch(55%   0.018 75);\n      --glass-bg:    oklch(97% 0.01 82 / 0.72);\n      --glass-border:oklch(80% 0.02 82 / 0.5);\n    }\n\n    html { scroll-behavior: smooth; }\n\n    body {\n      font-family: 'Jost', sans-serif;\n      background: var(--cream);\n      color: var(--ink);\n      overflow-x: hidden;\n    }\n\n    /* ── NAV ── */\n    nav {\n      position: fixed;\n      top: 0; left: 0; right: 0;\n      z-index: 100;\n      height: 60px;\n      display: flex;\n      align-items: center;\n      justify-content: space-between;\n      padding: 0 48px;\n      background: var(--glass-bg);\n      backdrop-filter: blur(24px) saturate(1.6);\n      -webkit-backdrop-filter: blur(24px) saturate(1.6);\n      border-bottom: 1px solid var(--glass-border);\n      opacity: 0;\n      transform: translateY(-8px);\n      animation: fadeDown 0.8s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;\n    }\n\n    .nav-logo {\n      font-family: 'Cormorant', serif;\n      font-weight: 200;\n      font-size: 18px;\n      letter-spacing: 0.18em;\n      text-transform: uppercase;\n      color: var(--ink);\n      text-decoration: none;\n    }\n\n    .nav-links {\n      display: flex;\n      gap: 36px;\n      list-style: none;\n    }\n\n    .nav-links a {\n      font-size: 12px;\n      font-weight: 300;\n      letter-spacing: 0.12em;\n      text-transform: uppercase;\n      color: var(--ink-soft);\n      text-decoration: none;\n      transition: color 0.25s;\n      position: relative;\n    }\n\n    .nav-links a::after {\n      content: '';\n      position: absolute;\n      bottom: -3px; left: 0;\n      width: 0; height: 1px;\n      background: var(--moss);\n      transition: width 0.3s cubic-bezier(0.22,1,0.36,1);\n    }\n\n    .nav-links a:hover { color: var(--ink); }\n    .nav-links a:hover::after { width: 100%; }\n    .nav-links a.active { color: var(--ink); }\n    .nav-links a.active::after { width: 100%; }\n\n    /* ── HERO ── */\n    .hero {\n      position: relative;\n      width: 100vw;\n      height: 100vh;\n      min-height: 600px;\n      overflow: hidden;\n    }\n\n    .hero-img {\n      position: absolute;\n      inset: 0;\n      width: 100%; height: 100%;\n      object-fit: cover;\n      object-position: center 45%;\n      filter: saturate(0.82) brightness(0.95);\n    }\n\n    /* Gradient veil — left-heavy so text is readable */\n    .hero-veil {\n      position: absolute;\n      inset: 0;\n      background:\n        linear-gradient(\n          105deg,\n          oklch(96.5% 0.012 82 / 0.88) 0%,\n          oklch(96.5% 0.012 82 / 0.72) 32%,\n          oklch(96.5% 0.012 82 / 0.20) 60%,\n          transparent 75%\n        );\n    }\n\n    .hero-content {\n      position: relative;\n      z-index: 2;\n      display: flex;\n      flex-direction: column;\n      justify-content: center;\n      height: 100%;\n      padding: 80px 80px 80px 80px;\n      max-width: 680px;\n    }\n\n    .hero-eyebrow {\n      font-size: 11px;\n      font-weight: 400;\n      letter-spacing: 0.22em;\n      text-transform: uppercase;\n      color: var(--moss);\n      margin-bottom: 28px;\n      opacity: 0;\n      transform: translateY(14px);\n      animation: riseIn 0.9s cubic-bezier(0.22,1,0.36,1) 0.55s forwards;\n    }\n\n    .hero-headline {\n      font-family: 'Cormorant', serif;\n      font-weight: 200;\n      font-size: clamp(72px, 9vw, 130px);\n      line-height: 0.92;\n      letter-spacing: -0.01em;\n      color: var(--ink);\n      margin-bottom: 32px;\n      opacity: 0;\n      transform: translateY(22px);\n      animation: riseIn 1.1s cubic-bezier(0.22,1,0.36,1) 0.72s forwards;\n    }\n\n    .hero-headline em {\n      font-style: italic;\n r {\n      background: var(--cream-mid);\n      padding: 96px 80px;\n      display: grid;\n      grid-template-columns: 1fr 1fr 1fr;\n      gap: 2px;\n    }\n\n    .teaser-item {\n      padding: 56px 48px;\n      background: var(--cream);\n      display: flex;\n      flex-direction: column;\n      gap: 16px;\n      transition: background 0.3s;\n    }\n\n    .teaser-item:hover { background: oklch(94% 0.018 82); }\n\n    .teaser-num {\n      font-family: 'Cormorant', serif;\n      font-size: 11px;\n      font-weight: 300;\n      letter-spacing: 0.2em;\n      color: var(--moss);\n    }\n\n    .teaser-title {\n      font-family: 'Cormorant', serif;\n      font-weight: 300;\n      font-size: 28px;\n      color: var(--ink);\n      line-height: 1.2;\n    }\n\n    .teaser-desc {\n      font-size: 13px;\n      font-weight: 300;\n      line-height: 1.7;\n      color: var(--ink-soft);\n      flex: 1;\n    }\n\n    .teaser-link {\n      font-size: 11px;\n      letter-spacing: 0.16em;\n      text-transform: uppercase;\n      color: var(--moss);\n      text-decoration: none;\n      display: inline-flex;\n      align-items: center;\n      gap: 8px;\n      transition: gap 0.3s;\n    }\n\n    .teaser-link:hover { gap: 14px; }\n\n    /* ── QUOTE BAND ── */\n    .quote-band {\n      padding: 120px 80px;\n      display: flex;\n      justify-content: center;\n      background: var(--cream);\n    }\n\n    .quote-inner {\n      max-width: 760px;\n      text-align: center;\n    }\n\n    .quote-text {\n      font-family: 'Cormorant', serif;\n      font-style: italic;\n      font-weight: 200;\n      font-size: clamp(26px, 3.5vw, 46px);\n      line-height: 1.45;\n      color: var(--ink);\n      margin-bottom: 28px;\n    }\n\n    .quote-attr {\n      font-size: 11px;\n      letter-spacing: 0.2em;\n      text-transform: uppercase;\n      color: var(--ink-faint);\n    }\n\n    .quote-rule {\n      width: 40px;\n      height: 1px;\n      background: var(--moss);\n      margin: 0 auto 24px;\n    } TEASER STRIP -->\n  <section class=\"teaser\" id=\"discover\">\n    <div class=\"teaser-item\">\n      <span class=\"teaser-num\">01 — Facts<\u002Fspan>\n      <h2 class=\"teaser-title\">A creature of contradictions<\u002Fh2>\n      <p class=\"teaser-desc\">It lays eggs, nurses young with milk, senses electric fields, and carries venom. The platypus breaks every rule biology thought it had written.<\u002Fp>\n      <a href=\"facts.html\" class=\"teaser-link\">Explore Facts →<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"teaser-item\">\n      <span class=\"teaser-num\">02 — Habitat<\u002Fspan>\n      <h2 class=\"teaser-title\">Waterways of eastern Australia<\u002Fh2>\n      <p class=\"teaser-desc\">From the cool streams of Queensland to the cold rivers of Tasmania, the platypus carves a quiet life along the margins of fresh water.<\u002Fp>\n      <a href=\"habitat.html\" class=\"teaser-link\">Explore Habitat →<\u002Fa>\n    <\u002Fdiv>\n    <div class=\"teaser-item\">\n      <span class=\"teaser-num\">03 — Gallery<\u002Fspan>\n      <h2 class=\"teaser-title\">Seen up close<\u002Fh2>\n      <p class=\"teaser-desc\">Rarely photographed in the wild, the platypus rewards patience. A curated collection of the most remarkable imagery from the field.<\u002Fp>\n      <a href=\"gallery.html\" class=\"teaser-link\">View Gallery →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- QUOTE -->\n  <section class=\"quote-band\">\n    <div class=\"quote-inner\">\n      <div class=\"quote-rule\"><\u002Fdiv>\n      <p class=\"quote-text\">\"When Europeans first encountered the platypus, a scientist suspected the specimen had been stitched together as a hoax.\"<\u002Fp>\n      <p class=\"quote-attr\">Natural History, 1799<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer>\n    <p>© 2026 Platypus — A Natural History<\u002Fp>\n    <p>A six-page web presentation<\u002Fp>\n  <\u002Ffooter>\n\n\n\n<\u002Fbody><\u002Fhtml>"
